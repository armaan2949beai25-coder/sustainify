<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offset Projects | Sustainify</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=1.1">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script type="module" src="js/components.js"></script>
</head>
<body>
    <div class="blob-bg"></div>
    <div class="blob-bg blob-bg-2"></div>

    <app-navbar></app-navbar>

    <main class="container page-content">
        <h1 class="page-title fade-in-up">Verified Offset Projects</h1>
        <p class="subtitle fade-in-up delay-1">Explore initiatives making a real difference. Offset your carbon credits effectively.</p>
        
        <!-- Controls area showing Advanced Array Methods (Filter) -->
        <div class="project-controls fade-in-up delay-2 glass-toolbar">
            <div class="filter-group">
                <label for="categoryFilter">Filter by Category:</label>
                <select id="categoryFilter">
                    <option value="all">All Projects</option>
                    <option value="reforestation">Reforestation</option>
                    <option value="renewable">Renewable Energy</option>
                    <option value="community">Community Tech</option>
                </select>
            </div>
            <div class="stats-group" id="projectStats">
                 <!-- Generated by Reduce array method -->
            </div>
        </div>

        <div class="projects-container">
            <!-- Loading State using Async/await representation -->
            <div id="loadingProjects" class="loader-container">
                <div class="spinner"></div>
                <p>Fetching projects via asynchronous simulated API...</p>
            </div>
            
            <div id="errorState" class="hidden error-state">
                <i class='bx bx-error-alt'></i>
                <p id="errorMsg"></p>
                <button id="retryBtn" class="btn outline-btn">Retry Fetch</button>
            </div>

            <!-- Project Cards Grid -->
            <div id="projectsGrid" class="projects-grid hidden">
                 <!-- Intercepted and built dynamically by JS `.map()` method -->
            </div>
        </div>
    </main>

    <app-footer></app-footer>

    <!-- Async/Await, Array Methods, Promises handled here -->
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/projects.js"></script>
</body>
</html>
